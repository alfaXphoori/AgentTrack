# .goreleaser.yaml
# Documentation at https://goreleaser.com
version: 2

project_name: AgentTrack

before:
  hooks:
    - go mod tidy

builds:
  - id: atrack
    binary: atrack
    main: ./cmd/atrack
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - scripts/gemiatrack.sh
      - scripts/gemini-cli-atrack.sh
      - scripts/auto-run-service.sh
      - scripts/vscode-copilot-watcher.sh
      - scripts/vscode-copilot-watcher.py

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

brews:
  - name: atrack
    repository:
      owner: alfaXphoori
      name: homebrew-agenttrack
    homepage: "https://github.com/alfaXphoori/AgentTrack"
    description: "Terminal CLI tool for tracking AI agent interactions"
    license: "MIT"
    directory: Formula
    install: |
      bin.install "atrack"
      bin.install "scripts/gemiatrack.sh" => "gemiatrack"
      bin.install "scripts/gemini-cli-atrack.sh" => "gemini-cli-atrack"
    test: |
      system "#{bin}/atrack", "--version"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
